<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>LuminaBoard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at top left, #2b2b40, #1e1e2f);
        font-family: 'Inter', sans-serif;
      }
      .toolbar-vertical {
        position: fixed;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(43, 43, 64, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-radius: 12px;
        z-index: 50;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      }
      .toolbar-horizontal {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(43, 43, 64, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 20px;
        border-radius: 12px;
        z-index: 50;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      }
      button {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }
      button:hover {
        background: #6a6aff;
        transform: scale(1.05);
      }
      .active-tool {
        background: #4c4cff !important;
        box-shadow: 0 0 10px rgba(76, 76, 255, 0.6);
      }
      .separator {
        width: 100%;
        height: 1px;
        background: rgba(255,255,255,0.2);
        margin: 4px 0;
      }
      .separator-v {
        width: 1px;
        height: 30px;
        background: rgba(255,255,255,0.2);
        margin: 0 4px;
      }
      input[type="color"] {
        width: 30px;
        height: 30px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: transparent;
      }
      input[type="range"] {
        width: 100px;
      }
      #container {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      #viewer {
        position: relative;
        transform-origin: center;
        will-change: transform;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      #drawCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 5;
        touch-action: none;
      }

/* PDF Buttons inside menu */
.pdfBtn{
  width:220px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#4c4cff,#6a6aff);
  color:white;
  font-size:16px;
  font-weight:600;
  text-align:left;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  transition:0.2s;
}

.pdfBtn:hover{
  background:linear-gradient(135deg,#6a6aff,#8a8aff);
  transform:scale(1.05);
}

/*background color match*/
body {
  background: #1e1e2f;
}

/* Modal Base */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: #1e1e2f; z-index: 1000;
  display: flex; justify-content: center; align-items: center;
}
.modal-box {
  background: rgba(43, 43, 64, 0.7); padding: 30px; border-radius: 16px; width: 450px;
  color: white; display: flex; flex-direction: column; gap: 15px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
.modal-box input, .modal-box select {
  padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(30,30,47, 0.8); color: white;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  width: 100%;
  box-sizing: border-box;
  transition: 0.2s;
}
.modal-box input:focus, .modal-box select:focus {
  outline: none;
  border-color: #6a6aff;
  box-shadow: 0 0 0 3px rgba(106, 106, 255, 0.3);
}
.modal-box button {
  width: 100%; height: 50px; background: linear-gradient(135deg, #4c4cff, #6a6aff);
  margin-top: 10px; font-weight: 600; font-family: 'Inter', sans-serif;
  font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.modal-box button:hover {
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(106, 106, 255, 0.5);
}
.hidden { display: none !important; }

.modal-separator {
  width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;
}

.btn-outline {
  background: transparent !important;
  border: 1px solid rgba(255,255,255,0.2) !important;
}
.btn-outline:hover {
  background: rgba(255,255,255,0.1) !important;
  box-shadow: none !important;
}

.btn-danger {
  background: rgba(255, 68, 68, 0.1) !important;
  color: #ff4444 !important;
  border: 1px solid rgba(255, 68, 68, 0.3) !important;
}
.btn-danger:hover {
  background: #ff4444 !important;
  color: white !important;
}

.board-item {
  display: flex;
  flex-direction: column;
  padding: 16px;
  background: rgba(30, 30, 47, 0.9);
  border-radius: 12px;
  margin-top: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.2s;
}
.board-item:hover {
  border-color: rgba(106, 106, 255, 0.5);
  background: rgba(40, 40, 60, 0.9);
}
.board-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.board-title {
  font-size: 18px;
  font-weight: 600;
}
.board-badge {
  background: rgba(106, 106, 255, 0.2);
  color: #a8a8ff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.board-actions {
  display: flex;
  gap: 8px;
}
.board-actions button {
  height: 40px;
  flex: 1;
  font-size: 14px;
  width: auto;
}

.error-msg {
  color: #ff6b6b;
  font-size: 14px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

/* date and time */
#timeDisplay,
#dateDisplay {
  text-shadow: 0 0 4px black;
}

    </style>
  </head>
  <body>

    <!-- ========== AUTH MODAL ========== -->
    <div id="authModal" class="modal-overlay">
      <div class="modal-box">
        <h1 style="margin:0; text-align:center; font-size:32px; background: linear-gradient(135deg, #a8a8ff, #ffffff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px;">LuminaBoard</h1>
        <p style="text-align:center; color:#aaa; margin-top:-5px; margin-bottom: 15px;">Sign in to manage your boards and PDFs.</p>
        
        <input type="email" id="emailInput" placeholder="Email Address" />
        <input type="password" id="passwordInput" placeholder="Password" />
        
        <button onclick="login()">Sign In</button>
        <button onclick="register()" class="btn-outline">Create Account</button>
        
        <div class="modal-separator"></div>
        
        <button onclick="mockGoogleLogin()" style="background:white !important; color:#333 !important; display:flex; justify-content:center; align-items:center; gap:10px;">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.565 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0 7.565 0 3.515 2.7 1.545 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
          Continue with Google
        </button>

        <div id="authError" class="error-msg"></div>
      </div>
    </div>

    <!-- ========== DASHBOARD MODAL ========== -->
    <div id="dashboardModal" class="modal-overlay hidden">
      <div class="modal-box" style="width:650px; max-height:85vh; padding:40px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h1 style="margin:0; font-size:28px; background: linear-gradient(135deg, #a8a8ff, #ffffff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Dashboard</h1>
          <button onclick="logout()" class="btn-outline" style="width:auto; padding:0 20px; height:38px; font-size:13px;">Log Out</button>
        </div>
        
        <div style="margin-top:15px;">
          <h3 style="margin:0 0 5px 0; font-size:18px; color:white;">Create New Board</h3>
          <p style="color:#aaa; font-size:13px; margin:0 0 15px 0;">Setup a board for your class. Add a subject tag for easy sorting.</p>
          
          <div style="display:flex; gap:12px;">
            <input type="text" id="boardNameInput" placeholder="Board Name (e.g. Physics 101)" style="flex:2;" />
            <select id="boardSubjectInput" style="flex:1; cursor:pointer;">
                <option value="Math">Math</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
                <option value="History">History</option>
                <option value="General">General</option>
            </select>
          </div>
          <button onclick="createBoard()" style="margin-top:12px;">Create Board</button>
        </div>

        <div class="modal-separator"></div>

        <h3 style="margin:0 0 10px 0; font-size:20px; color:white;">My Active Boards</h3>
        <div id="boardList" style="max-height:35vh; overflow-y:auto; padding-right:5px;"></div>
      </div>
    </div>

    <!-- Hidden file input for PDF upload -->
    <input type="file" id="fileInput" accept="application/pdf" style="display:none;" />

    <!-- VERTICAL TOOLBAR (Left side) -->
    <div class="toolbar-vertical">
      <button onclick="togglePDFLibrary()" title="PDF Library">📚</button>
      <div class="separator"></div>
      <button onclick="setTool('draw')" title="Pen">✏</button>
      <button onclick="setTool('highlight')" title="Highlighter">🖍</button>
      <button onclick="setTool('erase')" title="Eraser">🧽</button>
      <button class="smartboard-tool" onclick="setTool('laser')" title="Laser Pointer" style="color:#ff4444">☄</button>
      <button onclick="setTool('pan')" title="Pan">✋</button>
      <button class="smartboard-tool" onclick="toggleGrid()" title="Toggle Background Grid">▦</button>
      <div class="separator"></div>
      <button class="smartboard-tool" onclick="setTool('rect')" title="Rectangle">▭</button>
      <button class="smartboard-tool" onclick="setTool('circle')" title="Circle">◯</button>
      <button class="smartboard-tool" onclick="setTool('line')" title="Line">／</button>
      <button class="smartboard-tool" onclick="setTool('arrow')" title="Arrow">→</button>
      <div class="separator"></div>
      <button onclick="toggleStylusMode()" id="stylusBtn" title="Stylus Mode: Finger Erase" style="background: rgba(255,255,255,0.3)">👆</button>
    </div>

    <!-- FLOATING PDF LIBRARY MENU -->
    <div id="pdfLibrary" style="
      position:fixed;
      left:80px;
      top:50%;
      transform: translateY(-50%);
      background:rgba(43,43,64,0.9);
      backdrop-filter: blur(10px);
      padding:15px;
      border-radius:12px;
      display:none;
      flex-direction:column;
      gap:12px;
      z-index:100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    ">
      <div style="color:white;font-size:14px;font-weight:600;margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
          <span style="letter-spacing: 0.5px;">MY PDFs</span>
      </div>
      <div id="dynamicPdfList"></div>
    </div>

    <!-- HORIZONTAL TOOLBAR (Bottom) -->
    <div class="toolbar-horizontal">
      <button onclick="prevPage()" title="Previous Page">◀</button>
      <span id="pageInfo" style="color: white; font-size: 14px; font-weight:600; min-width:80px; text-align:center;">Page 0 / 0</span>
      <button onclick="nextPage()" title="Next Page">▶</button>
      <div class="separator-v"></div>
      
      <button onclick="addBlankPage()" title="Add Blank Page">➕</button>
      <button onclick="removePage()" title="Delete Page" style="color:#ff6b6b">🗑</button>
      <div class="separator-v"></div>

      <!-- Color button -->
      <div style="position: relative; display:flex; align-items:center;">
        <button id="mainColorBtn" style="background: #ff0000" onclick="toggleColorPalette()"></button>
        <div id="colorPalette" style="display: none; position: absolute; bottom: 50px; left: -10px; flex-direction: row; gap: 5px; background: rgba(43,43,64,0.9); padding: 5px; border-radius: 8px;">
          <button style="background: #ff0000" onclick="selectColor('#ff0000')"></button>
          <button style="background: #00ff00" onclick="selectColor('#00ff00')"></button>
          <button style="background: #0000ff" onclick="selectColor('#0000ff')"></button>
          <button style="background: #ffff00" onclick="selectColor('#ffff00')"></button>
          <button style="background: #ff00ff" onclick="selectColor('#ff00ff')"></button>
          <button style="background: #00ffff" onclick="selectColor('#00ffff')"></button>
          <button style="background: #000000" onclick="selectColor('#000000')"></button>
          <button style="background: #ffffff" onclick="selectColor('#ffffff')"></button>
        </div>
      </div>
      <input type="color" id="colorPicker" value="#ff0000" style="display: none" />
      <input type="range" id="brushSize" min="1" max="50" value="4" oninput="changeBrushSize(this.value)"/>
      <div class="separator-v"></div>

      <button onclick="undo()" title="Undo">↩</button>
      <button onclick="redo()" title="Redo">↪</button>
      <button onclick="clearCanvas()" title="Clear Canvas" style="color:#ff6b6b">❌</button>
      <div class="separator-v"></div>

      <button onclick="zoomOut()" title="Zoom Out">－</button>
      <button onclick="zoomIn()" title="Zoom In">＋</button>
      <button onclick="fit()" title="Reset Zoom">⤢</button>
      <div class="separator-v"></div>

      <button onclick="slideUp()" title="Scroll Canvas Up">⬆</button>
      <button onclick="slideDown()" title="Scroll Canvas Down">⬇</button>
      <div class="separator-v"></div>

      <button onclick="toggleFullscreen()" id="fsBtn" title="Fullscreen">⛶</button>
    </div>



    <div id="container">
      <div id="viewer">
        <canvas id="pdfCanvas"></canvas>
      </div>
    </div>
    <canvas id="drawCanvas"></canvas>

   <!-- Top right time -->
  <div style="position: fixed; top: 15px; right: 20px; text-align: right; z-index: 50; background: rgba(43,43,64,0.7); backdrop-filter: blur(5px); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
    <div id="timeDisplay" style="font-size: 20px; font-weight: 600; color: white;"></div>
    <div id="dateDisplay" style="font-size: 12px; color: #bbb;"></div>
  </div>

    <script src="script.js"></script>
  </body>
</html>
