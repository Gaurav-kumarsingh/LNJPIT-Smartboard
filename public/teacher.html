<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuminaBoard - Teacher Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #2b2b40, #1e1e2f);
      font-family: 'Inter', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    
    h1 {
      margin-top: 0;
      font-size: 32px;
      background: linear-gradient(135deg, #a8a8ff, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: rgba(43, 43, 64, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      margin-bottom: 30px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(30,30,47, 0.8);
      color: white;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
      font-size: 15px;
      transition: 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6a6aff;
      box-shadow: 0 0 0 3px rgba(106, 106, 255, 0.3);
    }

    button {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, #4c4cff, #6a6aff);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(106, 106, 255, 0.5);
    }

    .hidden { display: none !important; }

    .separator {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 25px 0;
    }

    .board-item {
      display: flex;
      flex-direction: column;
      padding: 16px;
      background: rgba(30, 30, 47, 0.9);
      border-radius: 12px;
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.2s;
    }

    .board-item:hover {
      border-color: rgba(106, 106, 255, 0.5);
      background: rgba(40, 40, 60, 0.9);
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .board-title {
      font-size: 18px;
      font-weight: 600;
    }

    .board-badge {
      background: rgba(106, 106, 255, 0.2);
      color: #a8a8ff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .board-actions {
      display: flex;
      gap: 8px;
    }

    .board-actions button {
      height: 40px;
      flex: 1;
      font-size: 14px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
      box-shadow: none;
    }

    .btn-danger {
      background: rgba(255, 68, 68, 0.1);
      color: #ff4444;
      border: 1px solid rgba(255, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background: #ff4444;
      color: white;
    }

    .error-msg {
      color: #ff6b6b;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
    }

  </style>
</head>
<body>

  <div id="authSection" class="container">
    <div class="card">
      <h1 style="text-align:center;">LuminaBoard Teacher</h1>
      <p style="text-align:center; color:#aaa; margin-bottom: 30px;">Sign in to manage classes, subjects, and PDFs.</p>
      
      <input type="email" id="emailInput" placeholder="Email Address" />
      <input type="password" id="passwordInput" placeholder="Password" />
      
      <button onclick="login()">Sign In</button>
      <button onclick="register()" class="btn-outline" style="margin-top:12px;">Create Account</button>
      
      <div class="separator"></div>
      
      <button onclick="mockGoogleLogin()" style="background:white; color:#333;">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/><path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.565 24 12.255 24z"/><path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 000 10.76l3.98-3.09z"/><path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0 7.565 0 3.515 2.7 1.545 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
        Continue with Google
      </button>

      <div id="authError" class="error-msg"></div>
    </div>
  </div>

  <div id="dashboardSection" class="container hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h1>Dashboard</h1>
        <button onclick="logout()" style="width:auto; padding:0 20px; height:40px;" class="btn-outline">Log Out</button>
    </div>

    <div class="card">
      <h3 style="margin-top:0; font-size: 20px;">Create New Class Board</h3>
      <p style="color:#aaa; font-size: 14px; margin-top:-5px; margin-bottom:20px;">Setup a board for students to view. Add a subject tag for easy sorting.</p>
      
      <div style="display:flex; gap:12px;">
        <input type="text" id="boardNameInput" placeholder="Class Name (e.g. Physics 101)" style="flex:2; margin:0;" />
        <select id="boardSubjectInput" style="flex:1; margin:0; cursor:pointer;">
            <option value="Math">Math</option>
            <option value="Science">Science</option>
            <option value="English">English</option>
            <option value="History">History</option>
            <option value="General">General</option>
        </select>
      </div>
      <button onclick="createBoard()" style="margin-top: 15px;">Create Board</button>
    </div>

    <h3 style="margin-bottom: 10px; font-size: 22px;">My Active Boards</h3>
    <div id="boardList"></div>
  </div>

  <input type="file" id="fileInput" accept="application/pdf" style="display:none;" />

  <script>
    let jwtToken = localStorage.getItem('teacherToken');
    let currentBoardId = null;

    if (jwtToken) {
        showDashboard();
    }

    async function login() {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const res = await fetch('/api/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
      });
      if (res.ok) {
          const data = await res.json();
          jwtToken = data.token;
          localStorage.setItem('teacherToken', jwtToken);
          showDashboard();
      } else {
          const err = await res.json();
          document.getElementById('authError').innerText = err.error || "Login fail";
      }
    }

    async function register() {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const res = await fetch('/api/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
      });
      if (res.ok) { login(); } 
      else {
         const err = await res.json();
         document.getElementById('authError').innerText = err.error || "Reg fail";
      }
    }

    async function mockGoogleLogin() {
        const mockEmail = "teacher_google@university.edu";
        await fetch('/api/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: mockEmail, password: 'google_mock_password' })
        });
        const loginRes = await fetch('/api/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: mockEmail, password: 'google_mock_password' })
        });
        const data = await loginRes.json();
        if (data.token) {
            jwtToken = data.token;
            localStorage.setItem('teacherToken', jwtToken);
            showDashboard();
        }
    }

    function logout() {
        jwtToken = null;
        localStorage.removeItem('teacherToken');
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('dashboardSection').classList.add('hidden');
    }

    function showDashboard() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('dashboardSection').classList.remove('hidden');
        loadBoards();
    }

    async function loadBoards() {
        const res = await fetch('/api/boards', { headers: { 'Authorization': `Bearer ${jwtToken}` }});
        if(res.status === 401 || res.status === 403) return logout();
        
        const boards = await res.json();
        const list = document.getElementById('boardList');
        list.innerHTML = "";
        
        if (boards.length === 0) {
            list.innerHTML = `<p style="color:#aaa; text-align:center; padding: 20px;">No boards created yet.</p>`;
            return;
        }

        boards.forEach(b => {
            const div = document.createElement('div');
            div.className = 'board-item';
            
            const header = document.createElement('div');
            header.className = 'board-header';
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'board-title';
            titleSpan.innerText = b.name;
            
            const badge = document.createElement('span');
            badge.className = 'board-badge';
            badge.innerText = b.subject || 'General';
            
            header.appendChild(titleSpan);
            header.appendChild(badge);
            
            const actions = document.createElement('div');
            actions.className = 'board-actions';
            
            const viewBtn = document.createElement('button');
            viewBtn.innerText = 'Go to Board';
            viewBtn.style.background = 'rgba(255,255,255,0.1)';
            viewBtn.onclick = () => window.open(`/?board=${b.id}`, '_blank');
            
            const uploadBtn = document.createElement('button');
            uploadBtn.innerText = 'Upload PDF';
            uploadBtn.onclick = () => {
                currentBoardId = b.id; 
                document.getElementById('fileInput').click();
            };
            
            const delBtn = document.createElement('button');
            delBtn.innerText = 'Delete';
            delBtn.className = 'btn-outline btn-danger';
            delBtn.onclick = () => deleteBoard(b.id);
            
            actions.appendChild(viewBtn);
            actions.appendChild(uploadBtn);
            actions.appendChild(delBtn);
            
            div.appendChild(header);
            div.appendChild(actions);
            list.appendChild(div);
        });
    }

    async function deleteBoard(id) {
        if (!confirm("Are you sure you want to delete this board and its PDFs? This cannot be undone.")) return;
        await fetch(`/api/boards/${id}`, {
            method: 'DELETE', headers: { 'Authorization': `Bearer ${jwtToken}` }
        });
        loadBoards();
    }

    async function createBoard() {
        const name = document.getElementById('boardNameInput').value;
        const subject = document.getElementById('boardSubjectInput').value;
        if (!name) return alert("Please enter a board name");
        
        await fetch('/api/boards', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwtToken}` },
            body: JSON.stringify({ name, subject })
        });
        document.getElementById('boardNameInput').value = '';
        loadBoards();
    }

    document.getElementById("fileInput").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file || !currentBoardId || !jwtToken) return;

        const uploadBtn = [...document.querySelectorAll('.board-item button')]
              .find(btn => btn.innerText === 'Uploading...' || (btn.innerText === 'Upload PDF' && btn.onclick.toString().includes('currentBoardId = b.id')));

        const formData = new FormData();
        formData.append('pdf', file);
        formData.append('board_id', currentBoardId);
        
        try {
            await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${jwtToken}` },
                body: formData
            });
            alert("PDF successfully uploaded to board!");
        } catch (err) { 
            console.error("Upload failed", err); 
            alert("Upload failed.");
        }
        e.target.value = ''; // reset
    });

  </script>
</body>
</html>
