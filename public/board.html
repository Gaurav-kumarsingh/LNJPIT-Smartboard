<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>SmartBoard Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at top left, #2b2b40, #1e1e2f);
        font-family: 'Inter', sans-serif;
        /* Prevent default touch actions  */
        touch-action: none;
      }
      #drawCanvas {
        touch-action: none;
      }
      .toolbar-vertical button i {
        margin-bottom: 2px;
      }
      /* Colorful but Professional Icons */
      .i-blue { color: #4fc3f7; }
      .i-green { color: #64ffda; }
      .i-yellow { color: #ffd740; }
      .i-red { color: #ff5252; }
      .i-pink { color: #f48fb1; }
      .i-purple { color: #b39ddb; }
      .i-orange { color: #ffb74d; }
      .i-teal { color: #4db6ac; }
      .i-grey { color: #90a4ae; }
      .i-white { color: #ffffff; }

      .color-btn-main {
        width: 36px !important;
        height: 36px !important;
        border: 2px solid white !important;
        border-radius: 50% !important;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
      }
      .color-palette {
        display: none;
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(43,43,64,0.95);
        backdrop-filter: blur(10px);
        padding: 8px;
        border-radius: 12px;
        flex-wrap: wrap;
        width: 140px;
        gap: 8px;
        z-index: 1000;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      }
      .palette-dot {
        width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; transition: 0.2s;
      }
      .palette-dot:hover { transform: scale(1.2); border-color: white; }

      .toolbar-vertical {
        position: fixed;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(43, 43, 64, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-radius: 12px;
        z-index: 50;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      }
      .toolbar-horizontal {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(43, 43, 64, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 15px;
        border-radius: 12px;
        z-index: 50;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        max-width: 95vw;
        /* overflow-x: auto removed to prevent palette clipping */
      }
      button {
        width: 50px;
        height: 50px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        transition: 0.2s;
        flex-shrink: 0;
      }
      button span.lbl {
        font-size: 8px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        text-transform: uppercase;
      }
      .toolbar-horizontal button {
        width: 40px; height: 40px;
      }
      .toolbar-horizontal button span.lbl {
        display: none;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }
      @media (max-width: 768px) {
        .toolbar-vertical {
          left: 5px;
          gap: 4px;
          padding: 6px;
        }
        button {
          width: 40px;
          height: 40px;
          font-size: 14px;
        }
        button span.lbl {
          display: none;
        }
        .toolbar-horizontal {
          bottom: 15px;
          padding: 6px 10px;
          gap: 4px;
        }
        .toolbar-horizontal button {
          width: 34px; height: 34px;
        }
      }
      @media (max-width: 480px) {
        .toolbar-vertical {
           left: 2px;
           padding: 3px;
        }
        button {
           width: 34px;
           height: 34px;
           font-size: 11px;
        }
        .toolbar-horizontal {
           width: 98%;
           padding: 4px;
           gap: 3px;
        }
        .toolbar-horizontal button {
           width: 30px; height: 30px;
        }
        .separator-v, .separator { display: none; }
      }
      .active-tool {
        background: #4c4cff !important;
        box-shadow: 0 0 10px rgba(76, 76, 255, 0.6);
      }
      .separator {
        width: 100%;
        height: 1px;
        background: rgba(255,255,255,0.2);
        margin: 4px 0;
      }
      .separator-v {
        width: 1px;
        height: 30px;
        background: rgba(255,255,255,0.2);
        margin: 0 4px;
      }
      input[type="color"] {
        width: 30px;
        height: 30px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: transparent;
      }
      input[type="range"] {
        width: 100px;
      }
      #container {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      #viewer {
        position: relative;
        transform-origin: center;
        will-change: transform;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      #drawCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 5;
        touch-action: none;
      }

/* PDF Buttons inside menu */
.pdfBtn{
  width:220px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#4c4cff,#6a6aff);
  color:white;
  font-size:16px;
  font-weight:600;
  text-align:left;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  transition:0.2s;
}

.pdfBtn:hover{
  background:linear-gradient(135deg,#6a6aff,#8a8aff);
  transform:scale(1.05);
}

/*background color match*/
body {
  background: #1e1e2f;
}

/* Modal Base */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: #1e1e2f; z-index: 1000;
  display: flex; justify-content: center; align-items: center;
}
.modal-box {
  background: rgba(43, 43, 64, 0.7); padding: 30px; border-radius: 16px; width: 450px;
  color: white; display: flex; flex-direction: column; gap: 15px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
.modal-box input, .modal-box select {
  padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(30,30,47, 0.8); color: white;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  width: 100%;
  box-sizing: border-box;
  transition: 0.2s;
}
.modal-box input:focus, .modal-box select:focus {
  outline: none;
  border-color: #6a6aff;
  box-shadow: 0 0 0 3px rgba(106, 106, 255, 0.3);
}
.modal-box button {
  width: 100%; height: 50px; background: linear-gradient(135deg, #4c4cff, #6a6aff);
  margin-top: 10px; font-weight: 600; font-family: 'Inter', sans-serif;
  font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.modal-box button:hover {
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(106, 106, 255, 0.5);
}
.hidden { display: none !important; }

.modal-separator {
  width: 100%; height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;
}

.btn-outline {
  background: transparent !important;
  border: 1px solid rgba(255,255,255,0.2) !important;
}
.btn-outline:hover {
  background: rgba(255,255,255,0.1) !important;
  box-shadow: none !important;
}

.btn-danger {
  background: rgba(255, 68, 68, 0.1) !important;
  color: #ff4444 !important;
  border: 1px solid rgba(255, 68, 68, 0.3) !important;
}
.btn-danger:hover {
  background: #ff4444 !important;
  color: white !important;
}

.board-item {
  display: flex;
  flex-direction: column;
  padding: 16px;
  background: rgba(30, 30, 47, 0.9);
  border-radius: 12px;
  margin-top: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.2s;
}
.board-item:hover {
  border-color: rgba(106, 106, 255, 0.5);
  background: rgba(40, 40, 60, 0.9);
}
.board-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.board-title {
  font-size: 18px;
  font-weight: 600;
}
.board-badge {
  background: rgba(106, 106, 255, 0.2);
  color: #a8a8ff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.board-actions {
  display: flex;
  gap: 8px;
}
.board-actions button {
  height: 40px;
  flex: 1;
  font-size: 14px;
  width: auto;
}

.error-msg {
  color: #ff6b6b;
  font-size: 14px;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
}

/* date and time */
#timeDisplay,
#dateDisplay {
  text-shadow: 0 0 4px black;
}

    </style>
  </head>
  <body>



    <!-- VERTICAL TOOLBAR (Left side) -->
    <div class="toolbar-vertical">
      <button onclick="togglePDFLibrary()" title="Resource"><i class="fas fa-university i-blue"></i><span class="lbl">Resource</span></button>
      <div class="separator"></div>
      <button onclick="setTool('draw')" title="Pen"><i class="fas fa-pen i-green"></i><span class="lbl">Pen</span></button>
      <button onclick="setTool('highlight')" title="Highlighter"><i class="fas fa-highlighter i-yellow"></i><span class="lbl">Marker</span></button>
      <button onclick="setTool('erase')" title="Eraser"><i class="fas fa-eraser i-red"></i><span class="lbl">Eraser</span></button>
      <button class="smartboard-tool" onclick="setTool('laser')" title="Laser Pointer"><i class="fas fa-magic i-pink"></i><span class="lbl">Laser</span></button>
      <button onclick="setTool('pan')" title="Pan"><i class="fas fa-hand-paper i-purple"></i><span class="lbl">Pan</span></button>
      <button class="smartboard-tool" onclick="toggleGrid()" title="Toggle Background Grid"><i class="fas fa-border-all i-green"></i><span class="lbl">Grid</span></button>
      
      <!-- SHAPE TOOL DROPDOWN -->
      <div style="position: relative;" id="shapeMenuWrap">
        <button class="smartboard-tool" onclick="document.getElementById('shapeMenu').style.display = document.getElementById('shapeMenu').style.display === 'none' ? 'flex' : 'none'" title="Shapes"><i class="fas fa-shapes i-purple"></i><span class="lbl">Shapes</span></button>
        <div id="shapeMenu" style="display: none; position: absolute; left: 60px; top: -10px; background: rgba(43,43,64,0.9); padding: 8px; border-radius: 8px; flex-direction: column; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
          <button class="smartboard-tool" onclick="setTool('rect');this.parentElement.style.display='none'"><i class="far fa-square i-white"></i></button>
          <button class="smartboard-tool" onclick="setTool('circle');this.parentElement.style.display='none'"><i class="far fa-circle i-white"></i></button>
          <button class="smartboard-tool" onclick="setTool('line');this.parentElement.style.display='none'"><i class="fas fa-slash i-white"></i></button>
          <button class="smartboard-tool" onclick="setTool('arrow');this.parentElement.style.display='none'"><i class="fas fa-long-arrow-alt-right i-white"></i></button>
        </div>
      </div>
      
      <div class="separator"></div>
      <button onclick="toggleCalc()" title="Calculator"><i class="fas fa-calculator i-orange"></i><span class="lbl">Calc</span></button>
      <button onclick="toggleTimer()" title="Timer"><i class="fas fa-stopwatch i-teal"></i><span class="lbl">Timer</span></button>
      <button onclick="exportAsPDF()" title="Export PDF"><i class="fas fa-file-export i-grey"></i><span class="lbl">Export</span></button>
      <button onclick="toggleStylusMode()" id="stylusBtn" title="Stylus Mode: Finger Erase" style="background: rgba(255,255,255,0.3)"><i class="fas fa-hand-pointer i-white"></i><span class="lbl">Stylus</span></button>
    </div>
    
    <!-- FLOATING PDF LIBRARY MENU -->
    <div id="pdfLibrary" style="
      position:fixed;
      left:80px;
      top:50%;
      transform: translateY(-50%);
      background:rgba(43,43,64,0.9);
      backdrop-filter: blur(10px);
      padding:15px;
      border-radius:12px;
      display:none;
      flex-direction:column;
      gap:12px;
      z-index:100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    ">
      <div style="color:white;font-size:14px;font-weight:600;margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
          <span style="letter-spacing: 0.5px; font-weight:700;">LESSON MATERIALS</span>
      </div>
      <div id="dynamicPdfList"></div>
    </div>

    <!-- HORIZONTAL TOOLBAR (Bottom) -->
    <div class="toolbar-horizontal">
      <button onclick="prevPage()" title="Previous Page">◀</button>
      <span id="pageInfo" style="color: white; font-size: 14px; font-weight:600; min-width:80px; text-align:center;">Page 0 / 0</span>
      <button onclick="nextPage()" title="Next Page">▶</button>
      <div class="separator-v"></div>
      
      <button onclick="addBlankPage()" title="Add Blank Page">➕</button>
      <button onclick="removePage()" title="Delete Page" style="color:#ff6b6b">🗑</button>
      <div class="separator-v"></div>

      <div class="separator-v"></div>

      <!-- Professional Color Hub -->
      <div style="position: relative; display:flex; align-items:center;">
        <div id="mainColorBtn" class="color-btn-main" style="background: #ff0000; border: 3px solid rgba(255,255,255,0.8); display:block;" onclick="toggleColorPalette()" title="Change Color"></div>
        <div id="colorPalette" class="color-palette" style="width: 210px; bottom: 75px; padding: 15px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; justify-items: center;">
          <div class="palette-dot" style="background: #ff0000" onclick="selectColor('#ff0000')" title="Red"></div>
          <div class="palette-dot" style="background: #00ff00" onclick="selectColor('#00ff00')" title="Green"></div>
          <div class="palette-dot" style="background: #0000ff" onclick="selectColor('#0000ff')" title="Blue"></div>
          <div class="palette-dot" style="background: #ffff00" onclick="selectColor('#ffff00')" title="Yellow"></div>
          <div class="palette-dot" style="background: #ffffff" onclick="selectColor('#ffffff')" title="White"></div>
          <div class="palette-dot" style="background: #000000" onclick="selectColor('#000000')" title="Black"></div>
          <div class="palette-dot" style="background: #ff00ff" onclick="selectColor('#ff00ff')" title="Pink"></div>
          <div class="palette-dot" style="background: #00ffff" onclick="selectColor('#00ffff')" title="Cyan"></div>
          <div class="palette-dot" style="background: #ffa500" onclick="selectColor('#ffa500')" title="Orange"></div>
          <div class="palette-dot" style="background: linear-gradient(45deg, #f00, #0f0, #00f); display:flex; align-items:center; justify-content:center; color:white; font-size:12px;" onclick="document.getElementById('colorPicker').click()" title="Custom Color">
             <i class="fas fa-eye-dropper"></i>
          </div>
        </div>
      </div>
      <input type="color" id="colorPicker" value="#ff0000" style="display: none" />
      <input type="range" id="brushSize" min="1" max="50" value="4" oninput="changeBrushSize(this.value)"/>
      <div class="separator-v"></div>

      <button onclick="undo()" title="Undo">↩</button>
      <button onclick="redo()" title="Redo">↪</button>
      <button onclick="clearCanvas()" title="Clear Canvas" style="color:#ff6b6b">❌</button>
      <div class="separator-v"></div>

      <button onclick="zoomOut()" title="Zoom Out">－</button>
      <button onclick="zoomIn()" title="Zoom In">＋</button>
      <button onclick="fit()" title="Reset Zoom">⤢</button>
      <div class="separator-v"></div>

      <button onclick="slideUp()" title="Scroll Canvas Up"><i class="fas fa-chevron-up"></i></button>
      <button onclick="slideDown()" title="Scroll Canvas Down"><i class="fas fa-chevron-down"></i></button>
      <div class="separator-v"></div>

      <button onclick="toggleFullscreen()" id="fsBtn" title="Fullscreen"><i class="fas fa-expand"></i></button>
    </div>

    <!-- Next Page Hint -->
    <div id="nextPageHint" onclick="addBlankPage()" style="display:none; position:fixed; bottom:100px; right:30px; background:rgba(16,185,129,0.9); color:white; padding:10px 20px; border-radius:30px; font-weight:600; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.3); z-index:100; animation: bounce 2s infinite;">
      <i class="fas fa-plus"></i> New Page
    </div>

    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>


    <div id="container">
      <div id="viewer">
        <canvas id="pdfCanvas"></canvas>
      </div>
      <canvas id="drawCanvas"></canvas>
    </div>

    <!-- Floating Panels -->
    <!-- Calculator -->
    <div id="floating-calc" style="display:none; position:fixed; top:100px; left:100px; width:220px; background:rgba(30,30,40,0.9); border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.6); z-index:100; border:1px solid rgba(255,255,255,0.2);">
        <div id="calc-header" style="padding:10px; cursor:move; background:rgba(255,255,255,0.1); border-radius:12px 12px 0 0; display:flex; justify-content:space-between; align-items:center; color:white; font-size:14px; font-weight:600;">
            <i class="fas fa-calculator"></i> Calculator
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleCalc()"></i>
        </div>
        <div style="padding:15px; color:white;">
            <input type="text" id="calc-display" disabled style="width:100%; padding:10px; font-size:20px; text-align:right; border-radius:6px; border:none; background:rgba(0,0,0,0.3); color:white; margin-bottom:10px; box-sizing:border-box;">
            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px;">
                <button onclick="calcType('7')" style="width:100%;height:40px;">7</button>
                <button onclick="calcType('8')" style="width:100%;height:40px;">8</button>
                <button onclick="calcType('9')" style="width:100%;height:40px;">9</button>
                <button onclick="calcType('/')" style="width:100%;height:40px;background:#ff9800">/</button>
                
                <button onclick="calcType('4')" style="width:100%;height:40px;">4</button>
                <button onclick="calcType('5')" style="width:100%;height:40px;">5</button>
                <button onclick="calcType('6')" style="width:100%;height:40px;">6</button>
                <button onclick="calcType('x')" style="width:100%;height:40px;background:#ff9800">×</button>
                
                <button onclick="calcType('1')" style="width:100%;height:40px;">1</button>
                <button onclick="calcType('2')" style="width:100%;height:40px;">2</button>
                <button onclick="calcType('3')" style="width:100%;height:40px;">3</button>
                <button onclick="calcType('-')" style="width:100%;height:40px;background:#ff9800">-</button>
                
                <button onclick="calcType('C')" style="width:100%;height:40px;background:#f44">C</button>
                <button onclick="calcType('0')" style="width:100%;height:40px;">0</button>
                <button onclick="calcEval()" style="width:100%;height:40px;background:#44f">=</button>
                <button onclick="calcType('+')" style="width:100%;height:40px;background:#ff9800">+</button>
            </div>
        </div>
    </div>

    <!-- Timer -->
    <div id="floating-timer" style="display:none; position:fixed; top:200px; left:100px; width:240px; background:rgba(30,30,40,0.95); border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.6); z-index:100; border:1px solid rgba(255,255,255,0.2);">
        <div id="timer-header" style="padding:10px; cursor:move; background:rgba(255,255,255,0.1); border-radius:12px 12px 0 0; display:flex; justify-content:space-between; align-items:center; color:white; font-size:14px; font-weight:600;">
            <span><i class="fas fa-stopwatch"></i> Timer / Stopwatch</span>
            <i class="fas fa-times" style="cursor:pointer" onclick="toggleTimer()"></i>
        </div>
        <div style="padding:15px; color:white;">
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
                <button onclick="setTimerMode('stopwatch')" style="width:45%; height:30px; font-size:10px; background:rgba(255,255,255,0.1);">Stopwatch</button>
                <button onclick="setTimerMode('timer')" style="width:45%; height:30px; font-size:10px; background:rgba(255,255,255,0.1);">Timer</button>
            </div>
            
            <div id="timer-display" style="font-size:36px; font-weight:700; font-variant-numeric: tabular-nums; text-align:center; margin-bottom:15px; text-shadow: 0 0 10px rgba(100,100,255,0.8);">00:00:00</div>
            
            <div id="timer-controls" style="display:none; justify-content:center; gap:10px; margin-bottom:15px;">
                <button onclick="adjTimer(60)" style="width:30px; height:30px;">+1m</button>
                <button onclick="adjTimer(-60)" style="width:30px; height:30px;">-1m</button>
                <button onclick="adjTimer(10)" style="width:30px; height:30px;">+10s</button>
            </div>

            <div style="display:flex; justify-content:center; gap:8px;">
                <button onclick="timerStart()" style="width:30%; height:35px; background:rgba(0,255,0,0.2); border:1px solid rgba(0,255,0,0.4);"><i class="fas fa-play"></i></button>
                <button onclick="timerStop()" style="width:30%; height:35px; background:rgba(255,0,0,0.2); border:1px solid rgba(255,0,0,0.4);"><i class="fas fa-pause"></i></button>
                <button onclick="timerReset()" style="width:30%; height:35px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);"><i class="fas fa-undo"></i></button>
            </div>
        </div>
    </div>

    <!-- QR Export Modal -->
    <div id="exportModal" class="modal-overlay hidden">
        <div class="modal-box" style="align-items:center; width:350px; background: rgba(30,30,40,0.95); border: 1px solid rgba(255,255,255,0.2);">
            <h2 style="color:white; margin-bottom:10px;"><i class="fas fa-qrcode"></i> Export Board</h2>
            <div id="qrCodeContainer" style="background:white; padding:15px; border-radius:10px; margin: 15px 0; border: 5px solid white;"></div>
            <p style="font-size:13px; color:#aaa; text-align:center; line-height:1.5;">Scan this QR code with your phone to download the lesson PDF, or click the button below.</p>
            
            <div style="display:flex; flex-direction:column; gap:10px; width:100%; margin-top:20px;">
                <button id="dlPdfBtn" onclick="" class="btn-primary" style="width:100%; height:45px; background:var(--accent-2); color:white; border:none; border-radius:8px; font-weight:600;"><i class="fas fa-download"></i> Download PDF Now</button>
                <button onclick="document.getElementById('exportModal').classList.add('hidden')" style="width:100%; height:40px; background:rgba(255,255,255,0.1); color:white; border:none; border-radius:8px;">Close</button>
            </div>
        </div>
    </div>

   <!-- Top right time -->
  <div style="position: fixed; top: 15px; right: 20px; text-align: right; z-index: 50; background: rgba(43,43,64,0.7); backdrop-filter: blur(5px); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
    <div id="timeDisplay" style="font-size: 20px; font-weight: 600; color: white;"></div>
    <div id="dateDisplay" style="font-size: 12px; color: #bbb;"></div>
    <!-- last changes -->
  </div>

    <div id="nextPageHint" style="display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); color:#fff; padding:10px 20px; border-radius:20px; pointer-events:none; font-size:14px; z-index:100; border: 1px solid rgba(255,255,255,0.2); backdrop-filter:blur(5px);">
        ↓ Slide Down for Next Page
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
